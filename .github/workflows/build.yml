name: Build ESP8266 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout
      uses: actions/checkout@v3

    # 2️⃣ Setup Arduino CLI (stable)
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1
      with:
        version: 0.33.0

    # 3️⃣ Configure ESP8266 board manager
    - name: Configure Arduino CLI
      run: |
        arduino-cli config init
        arduino-cli config set board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
        arduino-cli core update-index

    # 4️⃣ Install ESP8266 core
    - name: Install ESP8266 core
      run: |
        arduino-cli core install esp8266:esp8266

    # 5️⃣ Compile firmware (IMPORTANT FIX HERE)
    - name: Compile
      run: |
        arduino-cli compile \
        --fqbn esp8266:esp8266:nodemcuv2 \
        --output-dir build .

    # 6️⃣ Upload BIN artifact
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: build/*.bin
